name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-x86_64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build Rust
        run: cargo build --release --target ${{ matrix.target }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Build Frontend
        run: cd frontend && npm ci && npm run build

      - name: Package
        shell: bash
        run: |
          mkdir -p dist dist/frontend dist/i18n
          cp plugin.json dist/
          cp target/${{ matrix.target }}/release/*.dll dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/*.so dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/*.dylib dist/ 2>/dev/null || true
          if [ -d frontend/build ]; then cp -r frontend/build/* dist/frontend/; fi
          if [ -d i18n ]; then cp -r i18n/* dist/i18n/; fi
          if [ -d assets ]; then cp -r assets dist/assets; fi
          if command -v zip &> /dev/null; then
            cd dist && zip -r ../omniget-plugin-courses-${{ github.ref_name }}-${{ matrix.artifact }}.zip .
          else
            cd dist && pwsh -Command "Compress-Archive -Path * -DestinationPath ../omniget-plugin-courses-${{ github.ref_name }}-${{ matrix.artifact }}.zip"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: omniget-plugin-courses-*.zip
